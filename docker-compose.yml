services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-plantrabajo}
      POSTGRES_USER: ${DB_USER:-sisgep}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sisgep_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sisgep} -d ${DB_NAME:-plantrabajo}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/api/health/'); sys.exit(0 if r.status in (200, 301, 302) else 1)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      SECURE_SSL_REDIRECT: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,backend}
      DB_NAME: ${DB_NAME:-plantrabajo}
      DB_USER: ${DB_USER:-sisgep}
      DB_PASSWORD: ${DB_PASSWORD:-sisgep_secret}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: |
      sh -c "
        echo '0 3 * * * pg_dump postgres://\$${DB_USER}:\\$${DB_PASSWORD}@db:5432/\\$${DB_NAME} > /backups/backup_\$$(date +\\%Y\\%m\\%d_\\%H\\%M\\%S).dump 2>> /backups/backup.log' > /etc/crontabs/root
        crond -f
      "
    environment:
      DB_NAME: ${DB_NAME:-plantrabajo}
      DB_USER: ${DB_USER:-sisgep}
      DB_PASSWORD: ${DB_PASSWORD:-sisgep_secret}
    volumes:
      - postgres_data:/backups
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
